name: Java with Maven

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  EVOSCHEMA_TEST_DB_HOST: 127.0.0.1
  EVOSCHEMA_TEST_DB_PORT: 3306
  EVOSCHEMA_TEST_DB_USER: root
  EVOSCHEMA_TEST_DB_PASSWORD: evoschema_ci_root
  EVOSCHEMA_TEST_CUSTOMER_URL: jdbc:mysql://127.0.0.1:3306/customer_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
  EVOSCHEMA_TEST_CUSTOMER_USERNAME: root
  EVOSCHEMA_TEST_CUSTOMER_PASSWORD: evoschema_ci_root
  EVOSCHEMA_TEST_FINANCE_URL: jdbc:mysql://127.0.0.1:3306/finance_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
  EVOSCHEMA_TEST_FINANCE_USERNAME: root
  EVOSCHEMA_TEST_FINANCE_PASSWORD: evoschema_ci_root

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: evoschema_ci_root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pevoschema_ci_root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h "${EVOSCHEMA_TEST_DB_HOST}" -u"${EVOSCHEMA_TEST_DB_USER}" -p"${EVOSCHEMA_TEST_DB_PASSWORD}" --silent; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Create test databases
        run: |
          mysql -h "${EVOSCHEMA_TEST_DB_HOST}" -u"${EVOSCHEMA_TEST_DB_USER}" -p"${EVOSCHEMA_TEST_DB_PASSWORD}" -e "CREATE DATABASE IF NOT EXISTS customer_db;"
          mysql -h "${EVOSCHEMA_TEST_DB_HOST}" -u"${EVOSCHEMA_TEST_DB_USER}" -p"${EVOSCHEMA_TEST_DB_PASSWORD}" -e "CREATE DATABASE IF NOT EXISTS finance_db;"

      - name: Build with Maven
        run: mvn -B test
